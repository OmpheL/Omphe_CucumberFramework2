name: Omphe Cucumber Framework Tests

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      # =========================
      # Checkout Repository
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # Setup Java 21
      # =========================
      - name: Set up JDK 21
        uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # =========================
      # Run Tests
      # =========================
      - name: Run Maven Tests
        run: mvn clean test

      # =========================
      # Upload Extent Report
      # =========================
      - name: Upload Extent Report
        uses: actions/upload-artifact@v4

        with:
          name: extent-report
          path: test-output/ExtentReport/

      # =========================
      # Upload Cucumber Report
      # =========================
      - name: Upload Cucumber Report
        uses: actions/upload-artifact@v4

        with:
          name: cucumber-report
          path: target/cucumber-report.html

      # =========================
      # Upload Screenshots
      # =========================
      - name: Upload Screenshots
        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: screenshots
          path: test-output/screenshots/

      # =========================
      # Upload JSON Report
      # =========================
      - name: Upload Cucumber JSON
        uses: actions/upload-artifact@v4

        with:
          name: cucumber-json
          path: target/cucumber.json
