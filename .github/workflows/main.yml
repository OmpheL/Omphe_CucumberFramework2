name: Omphe Cucumber Framework Tests

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:

  test:

    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:

      # =========================
      # Checkout Repository
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # Setup Java 21
      # =========================
      - name: Set up JDK 21
        uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # =========================
      # Run Tests
      # =========================
      - name: Run Maven Tests
        run: mvn clean test -X

      # =========================
      # Debug Generated Files
      # =========================
      - name: Debug Generated Files
        if: always()

        run: |
          echo "===== TARGET ====="
          ls -R target || true

          echo "===== TEST OUTPUT ====="
          ls -R test-output || true

          echo "===== HTML FILES ====="
          find . -name "*.html"

          echo "===== JSON FILES ====="
          find . -name "*.json"

      # =========================
      # Upload Extent Report
      # =========================
      - name: Upload Extent Report
        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: extent-report
          path: |
            test-output/
            **/ExtentReport.html
            **/*.html

      # =========================
      # Upload Cucumber Report
      # =========================
      - name: Upload Cucumber Report
        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: cucumber-report
          path: |
            target/
            **/cucumber-report.html
            **/*.json

      # =========================
      # Upload Screenshots
      # =========================
      - name: Upload Screenshots
        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: screenshots
          path: |
            test-output/screenshots/
            **/*.png
