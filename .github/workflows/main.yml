name: Omphe Cucumber Framework Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run Tests
        run: mvn clean test -Dheadless=true

      - name: Debug - List All Files
        if: always()
        run: |
          ls -R target || true
          ls -R test-output || true

      - name: Upload Reports (Flexible)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            target/**
            test-output/**
          if-no-files-found: warn
